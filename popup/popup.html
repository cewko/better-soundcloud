          stroke="currentColor"
          stroke-width="1.8"

    </div>

    <div class="settings-panel" id="settingsPanel">
      <div class="settings-inner">
        <div class="settings-group">
          <div class="settings-group-title">Discord Rich Presence</div>
          <div class="field">
            <label for="discordClientID">CLIENT ID</label>
            <input
              type="text"
              id="discordClientID"
              placeholder="000000000000000000"
            />
          </div>
          <button class="save-btn" id="saveDRPButton">Save</button>
        </div>

        <div class="settings-group">
          <div class="settings-group-title">HTTP callback</div>
          <div class="field">
            <label for="endpointInput">URL</label>
            <input
              type="url"
              id="endpointInput"
              placeholder="https://example.com/now-playing"
            />
          </div>
          <div class="field">
            <label for="secretInput">PASSWORD</label>
            <input
              type="password"
              id="secretInput"
              placeholder="••••••••••••"
            />
          </div>
          <button class="save-btn" id="saveWebhookBtn">Save</button>
        </div>
      </div>
      <div id="statusMessage"></div>
    </div>
    <script src="./popup.js"></script>
  </body>
</html>
